<div class="min-h-screen bg-bg-base font-body text-ink py-10 px-4">
   <form
      [formGroup]="instructorForm"
      (ngSubmit)="onSubmit()"
      class="max-w-[520px] mx-auto bg-bg-elevated border border-solid border-hairline border-border-default rounded-2xl shadow-lg flex flex-col overflow-hidden"
   >
      <header class="flex items-start gap-4 px-7 py-6 border-b border-solid border-hairline border-border-default">
         <div class="flex-1 flex flex-col gap-1.5">
            <span class="text-label font-extrabold tracking-[0.25em] text-text-brand uppercase">
               {{ isEditMode() ? 'EDITAR INSTRUCTOR' : 'NUEVO INSTRUCTOR' }}
            </span>
            <h1 class="font-display text-[2rem] font-extrabold tracking-[-0.03em] text-ink leading-[1.05] m-0">
               {{ isEditMode() ? 'Editar instructor' : 'Crear instructor' }}
            </h1>
            <p class="text-body-sm text-muted leading-relaxed m-0 mt-1">
               Define los datos del instructor y la sucursal donde dará clases.
            </p>
         </div>

         <button
            type="button"
            (click)="onCancel()"
            [disabled]="isSubmitting()"
            class="w-9 h-9 shrink-0 rounded-full bg-bg-inset hover:bg-border-default flex items-center justify-center text-muted border-0 cursor-pointer transition-colors duration-fast disabled:opacity-50 disabled:cursor-not-allowed"
            aria-label="Cerrar"
         >
            <span class="material-symbols-rounded !text-[18px] !w-[18px] !h-[18px] leading-none">close</span>
         </button>
      </header>

      <div class="flex flex-col gap-7 px-7 py-7">
         <!-- Sec 1 · Sucursal -->
         <section class="flex flex-col gap-4">
            <header class="flex items-center gap-2">
               <div class="w-6 h-6 rounded-full bg-bg-brand-soft flex items-center justify-center shrink-0">
                  <span class="text-[11px] font-extrabold font-mono text-text-brand leading-none">1</span>
               </div>
               <h2 class="text-body font-extrabold tracking-[-0.01em] text-ink m-0">Sucursal</h2>
            </header>

            <label class="flex flex-col gap-1.5">
               <span class="text-caption font-bold text-muted">Sucursal asignada</span>
               <span
                  class="flex items-center gap-2.5 px-4 py-3.5 rounded-md bg-bg-elevated border border-solid border-hairline transition-colors duration-fast"
                  [class.border-border-strong]="!hasFieldError('branchId')"
                  [class.border-error]="hasFieldError('branchId')"
                  [class.border-thick]="hasFieldError('branchId')"
               >
                  <span class="material-symbols-rounded !text-[18px] !w-[18px] !h-[18px] leading-none text-faint shrink-0">storefront</span>
                  <select
                     formControlName="branchId"
                     class="bg-transparent border-0 outline-none flex-1 text-body-sm font-medium text-ink min-w-0 cursor-pointer appearance-none"
                  >
                     <option value="">Seleccionar sucursal…</option>
                     @for (branch of branches(); track branch.id) {
                        <option [value]="branch.id">{{ branch.name }}</option>
                     }
                  </select>
                  <span class="material-symbols-rounded !text-[18px] !w-[18px] !h-[18px] leading-none text-faint shrink-0">expand_more</span>
               </span>
               @if (hasFieldError('branchId')) {
                  <span class="text-caption font-medium text-error">{{ getFieldError('branchId') }}</span>
               }
            </label>
         </section>

         <!-- Sec 2 · Identidad -->
         <section class="flex flex-col gap-4">
            <header class="flex items-center gap-2">
               <div class="w-6 h-6 rounded-full bg-bg-inset flex items-center justify-center shrink-0">
                  <span class="text-[11px] font-extrabold font-mono text-faint leading-none">2</span>
               </div>
               <h2 class="text-body font-extrabold tracking-[-0.01em] text-ink m-0">Identidad</h2>
            </header>

            <div class="grid grid-cols-2 gap-3">
               <label class="flex flex-col gap-1.5">
                  <span class="text-caption font-bold text-muted">Nombre</span>
                  <span
                     class="flex items-center gap-2 px-4 py-3.5 rounded-md bg-bg-elevated border border-solid border-hairline transition-colors duration-fast"
                     [class.border-border-strong]="!hasFieldError('name')"
                     [class.border-error]="hasFieldError('name')"
                     [class.border-thick]="hasFieldError('name')"
                  >
                     <span class="material-symbols-rounded !text-[18px] !w-[18px] !h-[18px] leading-none text-faint shrink-0">person</span>
                     <input
                        type="text"
                        formControlName="name"
                        placeholder="Nombre"
                        autocomplete="off"
                        class="bg-transparent border-0 outline-none flex-1 text-body-sm font-medium text-ink placeholder:text-faint min-w-0"
                     />
                  </span>
                  @if (hasFieldError('name')) {
                     <span class="text-caption font-medium text-error">{{ getFieldError('name') }}</span>
                  }
               </label>

               <label class="flex flex-col gap-1.5">
                  <span class="text-caption font-bold text-muted">Apellido</span>
                  <span
                     class="flex items-center gap-2 px-4 py-3.5 rounded-md bg-bg-elevated border border-solid border-hairline transition-colors duration-fast"
                     [class.border-border-strong]="!hasFieldError('lastname')"
                     [class.border-error]="hasFieldError('lastname')"
                     [class.border-thick]="hasFieldError('lastname')"
                  >
                     <span class="material-symbols-rounded !text-[18px] !w-[18px] !h-[18px] leading-none text-faint shrink-0">person</span>
                     <input
                        type="text"
                        formControlName="lastname"
                        placeholder="Apellido"
                        autocomplete="off"
                        class="bg-transparent border-0 outline-none flex-1 text-body-sm font-medium text-ink placeholder:text-faint min-w-0"
                     />
                  </span>
                  @if (hasFieldError('lastname')) {
                     <span class="text-caption font-medium text-error">{{ getFieldError('lastname') }}</span>
                  }
               </label>
            </div>

            <label class="flex flex-col gap-1.5">
               <span class="text-caption font-bold text-muted">CI</span>
               <span
                  class="flex items-center gap-2.5 px-4 py-3.5 rounded-md bg-bg-elevated border border-solid border-hairline transition-colors duration-fast"
                  [class.border-border-strong]="!hasFieldError('ci')"
                  [class.border-error]="hasFieldError('ci')"
                  [class.border-thick]="hasFieldError('ci')"
               >
                  <span class="material-symbols-rounded !text-[18px] !w-[18px] !h-[18px] leading-none text-faint shrink-0">badge</span>
                  <input
                     type="text"
                     formControlName="ci"
                     placeholder="1234567"
                     autocomplete="off"
                     inputmode="numeric"
                     class="bg-transparent border-0 outline-none flex-1 text-body-sm font-bold font-mono text-ink placeholder:text-faint placeholder:font-medium min-w-0"
                  />
                  @if (instructorForm.get('ci')?.pending) {
                     <span class="text-caption text-faint shrink-0">Verificando…</span>
                  }
               </span>
               @if (hasFieldError('ci')) {
                  <span class="text-caption font-medium text-error">{{ getFieldError('ci') }}</span>
               }
            </label>
         </section>

         <!-- Sec 3 · Contacto -->
         <section class="flex flex-col gap-4">
            <header class="flex items-center gap-2">
               <div class="w-6 h-6 rounded-full bg-bg-inset flex items-center justify-center shrink-0">
                  <span class="text-[11px] font-extrabold font-mono text-faint leading-none">3</span>
               </div>
               <h2 class="text-body font-extrabold tracking-[-0.01em] text-ink m-0">Contacto</h2>
            </header>

            <label class="flex flex-col gap-1.5">
               <span class="text-caption font-bold text-muted">Celular</span>
               <span
                  class="flex items-center gap-2.5 px-4 py-3.5 rounded-md bg-bg-elevated border border-solid border-hairline transition-colors duration-fast"
                  [class.border-border-strong]="!hasFieldError('cellphone')"
                  [class.border-error]="hasFieldError('cellphone')"
                  [class.border-thick]="hasFieldError('cellphone')"
               >
                  <span class="material-symbols-rounded !text-[18px] !w-[18px] !h-[18px] leading-none text-faint shrink-0">call</span>
                  <input
                     type="tel"
                     formControlName="cellphone"
                     placeholder="78123456"
                     autocomplete="off"
                     inputmode="numeric"
                     class="bg-transparent border-0 outline-none flex-1 text-body-sm font-bold font-mono text-ink placeholder:text-faint placeholder:font-medium min-w-0"
                  />
               </span>
               @if (hasFieldError('cellphone')) {
                  <span class="text-caption font-medium text-error">{{ getFieldError('cellphone') }}</span>
               }
            </label>

            <label class="flex flex-col gap-1.5">
               <span class="text-caption font-bold text-muted">Email <span class="text-faint font-medium">(opcional)</span></span>
               <span
                  class="flex items-center gap-2.5 px-4 py-3.5 rounded-md bg-bg-elevated border border-solid border-hairline transition-colors duration-fast"
                  [class.border-border-strong]="!hasFieldError('email')"
                  [class.border-error]="hasFieldError('email')"
                  [class.border-thick]="hasFieldError('email')"
               >
                  <span class="material-symbols-rounded !text-[18px] !w-[18px] !h-[18px] leading-none text-faint shrink-0">mail</span>
                  <input
                     type="email"
                     formControlName="email"
                     placeholder="instructor@correo.com"
                     autocomplete="off"
                     class="bg-transparent border-0 outline-none flex-1 text-body-sm font-medium text-ink placeholder:text-faint min-w-0"
                  />
               </span>
               @if (hasFieldError('email')) {
                  <span class="text-caption font-medium text-error">{{ getFieldError('email') }}</span>
               }
            </label>
         </section>

         <!-- Sec 4 · Estado -->
         <section class="flex flex-col gap-3">
            <header class="flex items-center gap-2">
               <div class="w-6 h-6 rounded-full bg-bg-inset flex items-center justify-center shrink-0">
                  <span class="text-[11px] font-extrabold font-mono text-faint leading-none">4</span>
               </div>
               <h2 class="text-body font-extrabold tracking-[-0.01em] text-ink m-0">Estado</h2>
            </header>

            <label class="flex flex-col gap-1.5">
               <span class="text-caption font-bold text-muted">Estado</span>
               <span class="flex items-center gap-2.5 px-4 py-3.5 rounded-md bg-bg-elevated border border-solid border-hairline border-border-strong transition-colors duration-fast">
                  <span class="material-symbols-rounded !text-[18px] !w-[18px] !h-[18px] leading-none text-faint shrink-0">flag</span>
                  <select
                     formControlName="status"
                     class="bg-transparent border-0 outline-none flex-1 text-body-sm font-medium text-ink min-w-0 cursor-pointer appearance-none"
                  >
                     <option value="activo">Activo</option>
                     <option value="inactivo">Inactivo</option>
                  </select>
                  <span class="material-symbols-rounded !text-[18px] !w-[18px] !h-[18px] leading-none text-faint shrink-0">expand_more</span>
               </span>
            </label>
         </section>

         @if (errorMessage()) {
            <div class="flex items-start gap-3 px-4 py-3 rounded-md bg-error/10 border border-solid border-hairline border-error/30">
               <span class="material-symbols-rounded !text-[18px] !w-[18px] !h-[18px] leading-none text-error shrink-0 mt-0.5">error</span>
               <p class="text-caption font-medium text-error m-0 leading-relaxed">{{ errorMessage() }}</p>
            </div>
         }
      </div>

      <footer class="flex items-stretch gap-3 px-7 py-5 bg-bg-elevated border-t border-solid border-hairline border-border-default">
         <button
            type="button"
            (click)="onCancel()"
            [disabled]="isSubmitting()"
            class="inline-flex items-center justify-center gap-2 px-6 py-3.5 rounded-full bg-transparent border border-solid border-standard border-border-strong text-ink text-body-sm font-bold cursor-pointer transition-colors duration-fast hover:bg-bg-inset disabled:opacity-50 disabled:cursor-not-allowed"
         >
            Cancelar
         </button>
         <button
            type="submit"
            [disabled]="!canSubmit()"
            class="flex-1 inline-flex items-center justify-center gap-2 px-6 py-3.5 rounded-full bg-brand-500 hover:bg-brand-600 text-on-brand text-body-sm font-extrabold border-0 shadow-brand cursor-pointer transition-colors duration-fast disabled:opacity-50 disabled:cursor-not-allowed disabled:shadow-none"
         >
            @if (isSubmitting()) {
               <span class="w-4 h-4 rounded-full border-2 border-solid border-on-brand/30 border-t-on-brand animate-spin"></span>
               Guardando…
            } @else {
               <span class="material-symbols-rounded !text-[16px] !w-[16px] !h-[16px] leading-none">check</span>
               {{ submitButtonText() }}
            }
         </button>
      </footer>
   </form>
</div>
