<div class="min-h-screen bg-bg-base font-body text-ink py-10 px-4">
   <form
      [formGroup]="membershipForm"
      (ngSubmit)="onSubmit()"
      class="max-w-[480px] mx-auto bg-bg-elevated border border-solid border-hairline border-border-default rounded-2xl shadow-lg flex flex-col"
   >
      <!-- Header -->
      <header class="flex items-start gap-4 px-7 py-6 border-b border-solid border-hairline border-border-default rounded-tl-2xl rounded-tr-2xl">
         <div class="flex-1 flex flex-col gap-1.5">
            <span class="text-label font-extrabold tracking-[0.25em] text-text-brand uppercase">
               {{ isEditMode() ? 'EDITAR MEMBRESÍA' : 'NUEVA MEMBRESÍA' }}
            </span>
            <h1 class="font-display text-[2rem] font-extrabold tracking-[-0.03em] text-ink leading-[1.05] m-0">
               {{ isEditMode() ? 'Editar membresía' : 'Crear membresía' }}
            </h1>
            <p class="text-body-sm text-muted leading-relaxed m-0 mt-1">
               Define el plan de entrenamiento y sus condiciones.
            </p>
         </div>

         <button
            type="button"
            (click)="onCancel()"
            [disabled]="isSubmitting()"
            class="w-9 h-9 shrink-0 rounded-full bg-bg-inset hover:bg-border-default flex items-center justify-center text-muted border-0 cursor-pointer transition-colors duration-fast disabled:opacity-50 disabled:cursor-not-allowed"
            aria-label="Cerrar"
         >
            <span class="material-symbols-rounded !text-[18px] !w-[18px] !h-[18px] leading-none">close</span>
         </button>
      </header>

      <!-- Body -->
      <div class="flex flex-col gap-7 px-7 py-7">
         <!-- Sec 1 · Identidad -->
         <section class="flex flex-col gap-4">
            <header class="flex items-center gap-2">
               <div class="w-6 h-6 rounded-full bg-bg-brand-soft flex items-center justify-center shrink-0">
                  <span class="text-[11px] font-extrabold font-mono text-text-brand leading-none">1</span>
               </div>
               <h2 class="text-body font-extrabold tracking-[-0.01em] text-ink m-0">Identidad del plan</h2>
            </header>

            <label class="flex flex-col gap-1.5">
               <span class="text-caption font-bold text-muted">Nombre</span>
               <span
                  class="flex items-center gap-2.5 px-4 py-3.5 rounded-md bg-bg-elevated border border-solid border-hairline transition-colors duration-fast"
                  [class.border-border-strong]="!hasError('name')"
                  [class.border-error]="hasError('name')"
                  [class.border-thick]="hasError('name')"
               >
                  <span class="material-symbols-rounded !text-[18px] !w-[18px] !h-[18px] leading-none text-faint shrink-0">card_membership</span>
                  <input
                     type="text"
                     formControlName="name"
                     placeholder="Ej. Mensual Premium"
                     autocomplete="off"
                     class="bg-transparent border-0 outline-none flex-1 text-body-sm font-medium text-ink placeholder:text-faint min-w-0"
                  />
               </span>
               @if (hasError('name')) {
                  <span class="text-caption font-medium text-error">{{ getErrorMessage('name') }}</span>
               }
            </label>
         </section>

         <!-- Sec 2 · Beneficios -->
         <section class="flex flex-col gap-4">
            <header class="flex items-center gap-2">
               <div class="w-6 h-6 rounded-full bg-bg-inset flex items-center justify-center shrink-0">
                  <span class="text-[11px] font-extrabold font-mono text-faint leading-none">2</span>
               </div>
               <h2 class="text-body font-extrabold tracking-[-0.01em] text-ink m-0">Beneficios</h2>
            </header>

            <div class="grid grid-cols-2 gap-3">
               <label class="flex flex-col gap-1.5">
                  <span class="text-caption font-bold text-muted">Duración (días)</span>
                  <span
                     class="flex items-center gap-2 px-4 py-3.5 rounded-md bg-bg-elevated border border-solid border-hairline transition-colors duration-fast"
                     [class.border-border-strong]="!hasError('durationDays')"
                     [class.border-error]="hasError('durationDays')"
                     [class.border-thick]="hasError('durationDays')"
                  >
                     <span class="material-symbols-rounded !text-[18px] !w-[18px] !h-[18px] leading-none text-faint shrink-0">date_range</span>
                     <input
                        type="number"
                        formControlName="durationDays"
                        placeholder="30"
                        min="1"
                        class="bg-transparent border-0 outline-none flex-1 text-body-sm font-bold font-mono text-ink placeholder:text-faint placeholder:font-medium min-w-0"
                     />
                  </span>
                  @if (hasError('durationDays')) {
                     <span class="text-caption font-medium text-error">{{ getErrorMessage('durationDays') }}</span>
                  }
               </label>

               <label class="flex flex-col gap-1.5">
                  <span class="text-caption font-bold text-muted">Sesiones</span>
                  <span
                     class="flex items-center gap-2 px-4 py-3.5 rounded-md bg-bg-elevated border border-solid border-hairline transition-colors duration-fast"
                     [class.border-border-strong]="!hasError('totalSessions')"
                     [class.border-error]="hasError('totalSessions')"
                     [class.border-thick]="hasError('totalSessions')"
                  >
                     <span class="material-symbols-rounded !text-[18px] !w-[18px] !h-[18px] leading-none text-faint shrink-0">repeat</span>
                     <input
                        type="number"
                        formControlName="totalSessions"
                        placeholder="12"
                        min="1"
                        class="bg-transparent border-0 outline-none flex-1 text-body-sm font-bold font-mono text-ink placeholder:text-faint placeholder:font-medium min-w-0"
                     />
                  </span>
                  @if (hasError('totalSessions')) {
                     <span class="text-caption font-medium text-error">{{ getErrorMessage('totalSessions') }}</span>
                  }
               </label>
            </div>
         </section>

         <!-- Sec 3 · Costo y estado -->
         <section class="flex flex-col gap-4">
            <header class="flex items-center gap-2">
               <div class="w-6 h-6 rounded-full bg-bg-inset flex items-center justify-center shrink-0">
                  <span class="text-[11px] font-extrabold font-mono text-faint leading-none">3</span>
               </div>
               <h2 class="text-body font-extrabold tracking-[-0.01em] text-ink m-0">Costo y estado</h2>
            </header>

            <div class="grid grid-cols-2 gap-3">
               <label class="flex flex-col gap-1.5">
                  <span class="text-caption font-bold text-muted">Costo (Bs)</span>
                  <span
                     class="flex items-center gap-2 px-4 py-3.5 rounded-md bg-bg-elevated border border-solid border-hairline transition-colors duration-fast"
                     [class.border-border-strong]="!hasError('cost')"
                     [class.border-error]="hasError('cost')"
                     [class.border-thick]="hasError('cost')"
                  >
                     <span class="text-body-sm font-bold font-mono text-faint shrink-0">Bs</span>
                     <input
                        type="number"
                        formControlName="cost"
                        placeholder="0.00"
                        min="0"
                        step="0.01"
                        class="bg-transparent border-0 outline-none flex-1 text-body-sm font-bold font-mono text-ink placeholder:text-faint placeholder:font-medium min-w-0"
                     />
                  </span>
                  @if (hasError('cost')) {
                     <span class="text-caption font-medium text-error">{{ getErrorMessage('cost') }}</span>
                  }
               </label>

               <div class="flex flex-col gap-1.5">
                  <span class="text-caption font-bold text-muted">Estado</span>
                  <div class="flex items-center gap-2 h-[50px]">
                     <button type="button" (click)="membershipForm.patchValue({ status: 'activo' })"
                        class="flex-1 h-full rounded-md text-body-sm font-extrabold border border-solid border-hairline cursor-pointer transition-colors duration-fast"
                        [class]="membershipForm.get('status')?.value === 'activo' ? 'bg-bg-brand-soft text-text-brand border-border-brand' : 'bg-bg-elevated text-muted border-border-default hover:bg-bg-inset'">
                        Activo
                     </button>
                     <button type="button" (click)="membershipForm.patchValue({ status: 'inactivo' })"
                        class="flex-1 h-full rounded-md text-body-sm font-extrabold border border-solid border-hairline cursor-pointer transition-colors duration-fast"
                        [class]="membershipForm.get('status')?.value === 'inactivo' ? 'bg-bg-brand-soft text-text-brand border-border-brand' : 'bg-bg-elevated text-muted border-border-default hover:bg-bg-inset'">
                        Inactivo
                     </button>
                  </div>
               </div>
            </div>
         </section>

         <!-- Error message -->
         @if (errorMessage()) {
            <div class="flex items-start gap-3 px-4 py-3 rounded-md bg-error/10 border border-solid border-hairline border-error/30">
               <span class="material-symbols-rounded !text-[18px] !w-[18px] !h-[18px] leading-none text-error shrink-0 mt-0.5">error</span>
               <p class="text-caption font-medium text-error m-0 leading-relaxed">{{ errorMessage() }}</p>
            </div>
         }
      </div>

      <!-- Footer -->
      <footer class="flex items-stretch gap-3 px-7 py-5 bg-bg-elevated border-t border-solid border-hairline border-border-default rounded-bl-2xl rounded-br-2xl">
         <button
            type="button"
            (click)="onCancel()"
            [disabled]="isSubmitting()"
            class="inline-flex items-center justify-center gap-2 px-6 py-3.5 rounded-full bg-transparent border border-solid border-standard border-border-strong text-ink text-body-sm font-bold cursor-pointer transition-colors duration-fast hover:bg-bg-inset disabled:opacity-50 disabled:cursor-not-allowed"
         >
            Cancelar
         </button>
         <button
            type="submit"
            [disabled]="membershipForm.invalid || isSubmitting()"
            class="flex-1 inline-flex items-center justify-center gap-2 px-6 py-3.5 rounded-full bg-brand-500 hover:bg-brand-600 text-on-brand text-body-sm font-extrabold border-0 shadow-brand cursor-pointer transition-colors duration-fast disabled:opacity-50 disabled:cursor-not-allowed disabled:shadow-none"
         >
            @if (isSubmitting()) {
               <span class="w-4 h-4 rounded-full border-2 border-solid border-on-brand/30 border-t-on-brand animate-spin"></span>
               Guardando…
            } @else {
               <span class="material-symbols-rounded !text-[16px] !w-[16px] !h-[16px] leading-none">check</span>
               {{ isEditMode() ? 'Actualizar membresía' : 'Crear membresía' }}
            }
         </button>
      </footer>
   </form>
</div>
