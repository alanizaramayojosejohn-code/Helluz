@if (shouldShow()) {
   <div
      class="fixed z-[9990] left-3 right-3 bottom-3 sm:left-auto sm:right-5 sm:bottom-5 sm:max-w-sm
             bg-[#111] border border-white/10 rounded-2xl shadow-[0_20px_50px_-10px_rgba(0,0,0,0.7)]
             p-4 sm:p-5 flex items-start gap-4 animate-[slideUp_0.3s_ease-out]"
      role="dialog"
      aria-labelledby="install-title"
      aria-describedby="install-desc">
      <div class="relative shrink-0">
         <div class="absolute inset-0 rounded-xl bg-red-600/40 blur-lg" aria-hidden="true"></div>
         <div
            class="relative w-12 h-12 rounded-xl bg-gradient-to-br from-red-600 to-red-900
                   flex items-center justify-center shadow-[0_0_20px_rgba(220,38,38,0.4)]">
            <img src="/icons/icon-192x192.png" alt="" class="w-9 h-9 rounded-lg object-contain" />
         </div>
      </div>

      <div class="flex-1 min-w-0 flex flex-col gap-2">
         <div class="flex items-start justify-between gap-2">
            <h2 id="install-title" class="font-display text-base font-extrabold text-white tracking-tight">
               Instala Helluz
            </h2>
            <button
               type="button"
               (click)="dismiss()"
               aria-label="Cerrar"
               class="shrink-0 -mt-1 -mr-1 w-7 h-7 rounded-full text-gray-400 hover:text-white hover:bg-white/10
                      flex items-center justify-center transition-colors">
               <i class="fas fa-xmark text-sm"></i>
            </button>
         </div>

         @if (isIos && !canInstall()) {
            <p id="install-desc" class="text-xs text-gray-400 leading-relaxed">
               Toca <i class="fas fa-arrow-up-from-bracket mx-0.5 text-red-500"></i>
               <span class="text-white font-semibold">Compartir</span> y luego
               <span class="text-white font-semibold">"Añadir a inicio"</span>.
            </p>
         } @else {
            <p id="install-desc" class="text-xs text-gray-400 leading-relaxed">
               Acceso rápido desde tu pantalla de inicio, sin abrir el navegador.
            </p>
            <div class="flex items-center gap-2 mt-1">
               <button
                  type="button"
                  (click)="install()"
                  class="inline-flex items-center justify-center gap-2 bg-red-600 hover:bg-red-500
                         text-white text-xs font-bold px-4 py-2 rounded-full transition-colors">
                  <i class="fas fa-download text-[10px]"></i>
                  Instalar
               </button>
               <button
                  type="button"
                  (click)="dismiss()"
                  class="text-xs text-gray-400 hover:text-white font-medium px-3 py-2 transition-colors">
                  Ahora no
               </button>
            </div>
         }
      </div>
   </div>
}
