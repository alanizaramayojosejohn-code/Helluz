name: Deploy to Firebase Hosting on merge

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1

      - name: Create environment.prod.ts
        run: |
          cat > src/environments/environment.prod.ts << EOF
          export const environment = {
            production: true,
            firebase: {
              apiKey: "${{ secrets.PROD_API_KEY }}",
              authDomain: "${{ secrets.PROD_AUTH_DOMAIN }}",
              projectId: "${{ secrets.PROD_PROJECT_ID }}",
              storageBucket: "${{ secrets.PROD_STORAGE_BUCKET }}",
              messagingSenderId: "${{ secrets.PROD_MESSAGING_SENDER_ID }}",
              appId: "${{ secrets.PROD_APP_ID }}",
              measurementId: "${{ secrets.PROD_MEASUREMENT_ID }}"
            }
            recaptchaSiteKey: "${{ secrets.PROD_RECAPTCHA_KEY }}"
          };
          EOF

      - run: bun install

      - run: bun run build -- --configuration production --project=frontend

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_HELLUZ }}
          channelId: live
          projectId: helluz
