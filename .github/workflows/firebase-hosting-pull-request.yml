name: Deploy to Firebase Hosting on PR

on: pull_request

permissions:
   checks: write
   contents: read
   pull-requests: write

jobs:
   build_and_preview:
      if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
      runs-on: ubuntu-latest
      steps:
         - uses: actions/checkout@v4

         - uses: oven-sh/setup-bun@v1

         - name: Create environment.prod.ts
           env:
              PROD_API_KEY: ${{ secrets.PROD_API_KEY }}
              PROD_AUTH_DOMAIN: ${{ secrets.PROD_AUTH_DOMAIN }}
              PROD_PROJECT_ID: ${{ secrets.PROD_PROJECT_ID }}
              PROD_STORAGE_BUCKET: ${{ secrets.PROD_STORAGE_BUCKET }}
              PROD_MESSAGING_SENDER_ID: ${{ secrets.PROD_MESSAGING_SENDER_ID }}
              PROD_APP_ID: ${{ secrets.PROD_APP_ID }}
              PROD_MEASUREMENT_ID: ${{ secrets.PROD_MEASUREMENT_ID }}
              PROD_RECAPTCHA_KEY: ${{ secrets.PROD_RECAPTCHA_KEY }}
           run: |
              cat > src/environments/environment.prod.ts << EOF
              export const environment = {
               production: true,
               firebase: {
                 apiKey: "${PROD_API_KEY}",
                 authDomain: "${PROD_AUTH_DOMAIN}",
                 projectId: "${PROD_PROJECT_ID}",
                 storageBucket: "${PROD_STORAGE_BUCKET}",
                 messagingSenderId: "${PROD_MESSAGING_SENDER_ID}",
                 appId: "${PROD_APP_ID}",
                 measurementId: "${PROD_MEASUREMENT_ID}"
               },
               recaptchaSiteKey: "${ PROD_RECAPTCHA_KEY }"
              };
              EOF

         - run: bun install

         - run: bun run build -- --configuration production --project=frontend

         - uses: FirebaseExtended/action-hosting-deploy@v0
           with:
              repoToken: ${{ secrets.GITHUB_TOKEN }}
              firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_HELLUZ }}
              projectId: helluz
